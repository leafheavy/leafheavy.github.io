<aside class="sidebar sticky apple-recommendation-sidebar" aria-label="你可能感兴趣的 Blog 推荐">
  <div class="profile_box apple-recommendation-box">
    <div class="apple-recommendation-heading">
      <span class="apple-recommendation-kicker">继续阅读</span>
      <h3>你可能感兴趣的 Blog 推荐</h3>
      <p>根据标题和标签为你挑选</p>
    </div>
    <ol id="blog-recommendations" class="apple-recommendation-list" aria-live="polite">
      {% assign other_posts = site.posts | where_exp: "post", "post.url != page.url" %}
      {% for post in other_posts limit: 3 %}
        <li><a href="{{ post.url | relative_url }}" target="_self">{{ post.title }}</a></li>
      {% endfor %}
    </ol>
  </div>
</aside>

<script id="current-post-data" type="application/json">{
  "url": {{ page.url | jsonify }},
  "title": {{ page.title | jsonify }},
  "tags": {{ page.tags | default: empty | jsonify }}
}</script>
<script id="all-posts-data" type="application/json">[
  {% for post in site.posts %}
    {
      "url": {{ post.url | jsonify }},
      "title": {{ post.title | jsonify }},
      "tags": {{ post.tags | default: empty | jsonify }},
      "date": {{ post.date | date_to_xmlschema | jsonify }}
    }{% unless forloop.last %},{% endunless %}
  {% endfor %}
]</script>
<script>
  (function () {
    var list = document.getElementById('blog-recommendations');
    var currentData = document.getElementById('current-post-data');
    var postsData = document.getElementById('all-posts-data');
    if (!list || !currentData || !postsData) return;

    try {
      var currentPost = JSON.parse(currentData.textContent);
      var allPosts = JSON.parse(postsData.textContent);

      function normalize(value) {
        return String(value || '').toLowerCase().trim();
      }

      function tagsOf(post) {
        if (Array.isArray(post.tags)) return post.tags.map(normalize).filter(Boolean);
        return post.tags ? [normalize(post.tags)] : [];
      }

      function wordsOf(title) {
        return normalize(title).split(/[^a-z0-9\u3400-\u9fff]+/).filter(function (word) {
          return word.length > 1;
        });
      }

      function bigramsOf(title) {
        var compactTitle = normalize(title).replace(/[^a-z0-9\u3400-\u9fff]+/g, '');
        var bigrams = [];
        for (var index = 0; index < compactTitle.length - 1; index += 1) {
          bigrams.push(compactTitle.slice(index, index + 2));
        }
        return bigrams;
      }

      function score(candidate) {
        var total = 0;
        var currentTags = tagsOf(currentPost);
        var candidateTags = tagsOf(candidate);
        var currentWords = wordsOf(currentPost.title);
        var candidateWords = wordsOf(candidate.title);
        var currentBigrams = bigramsOf(currentPost.title);
        var candidateBigrams = bigramsOf(candidate.title);

        currentTags.forEach(function (tag) {
          candidateTags.forEach(function (candidateTag) {
            if (tag === candidateTag) total += 100;
            else if (tag.indexOf(candidateTag) !== -1 || candidateTag.indexOf(tag) !== -1) total += 30;
          });
        });
        currentWords.forEach(function (word) {
          if (candidateWords.indexOf(word) !== -1) total += 12;
        });
        currentBigrams.forEach(function (bigram) {
          if (candidateBigrams.indexOf(bigram) !== -1) total += 4;
        });
        return total;
      }

      var recommendations = allPosts.filter(function (post) {
        return post.url && post.url !== currentPost.url;
      }).map(function (post) {
        return { post: post, score: score(post) };
      }).sort(function (first, second) {
        return second.score - first.score || String(second.post.date || '').localeCompare(String(first.post.date || ''));
      }).slice(0, 3);

      if (!recommendations.length) return;
      list.innerHTML = '';
      recommendations.forEach(function (recommendation) {
        var item = document.createElement('li');
        var link = document.createElement('a');
        link.href = recommendation.post.url;
        link.target = '_self';
        link.textContent = recommendation.post.title;
        item.appendChild(link);
        list.appendChild(item);
      });
    } catch (error) {
      // The server-rendered links remain available if the page data is malformed.
    }
  })();
</script>
