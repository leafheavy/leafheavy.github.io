---
layout: default
---

<article class="apple-content apple-article">
  <header class="apple-article-header">
    <h1 class="apple-article-title">{{ page.title }}</h1>
    <div class="apple-article-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %d, %Y" }}
      </time>
      {% if page.categories and page.categories.size > 0 %}
        <span aria-hidden="true"> | </span>
        <span>{{ page.categories | join: ", " }}</span>
      {% endif %}
    </div>
  </header>

  <div class="apple-article-body">
    {{ content }}
  </div>

  <footer class="apple-article-footer">
    <a class="apple-back-link" href="{{ '/blog/' | relative_url }}">Back to Blog</a>
  </footer>

  <button id="apple-share-button" class="apple-share-button" type="button" aria-label="Copy article link">
    Share
  </button>
</article>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    var shareButton = document.getElementById('apple-share-button');
    if (!shareButton) return;

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }

      return new Promise(function (resolve, reject) {
        var textArea = document.createElement('textarea');
        textArea.value = text;
        textArea.setAttribute('readonly', '');
        textArea.style.position = 'absolute';
        textArea.style.left = '-9999px';
        document.body.appendChild(textArea);
        textArea.select();

        var succeeded = document.execCommand('copy');
        document.body.removeChild(textArea);

        if (succeeded) {
          resolve();
        } else {
          reject(new Error('copy failed'));
        }
      });
    }

    shareButton.addEventListener('click', function () {
      var originalText = shareButton.textContent;
      copyText(window.location.href).then(function () {
        shareButton.textContent = 'Copied';
      }).catch(function () {
        shareButton.textContent = 'Copy failed';
      }).finally(function () {
        setTimeout(function () {
          shareButton.textContent = originalText;
        }, 1600);
      });
    });
  });
</script>
